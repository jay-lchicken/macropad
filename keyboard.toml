[keyboard]
name = "RMK Keyboard"
product_name = "RMK Keyboard"
vendor_id = 0x4c4b
product_id = 0x4643
manufacturer = "RMK"
chip = "rp2040"

[layout]
rows = 2
cols = 6
layers = 2

# Each key maps directly to input_pins in order
keymap = [
    [
        ["A", "B", "C", "Kc1", "Kc2", "Kc3"],
        ["LCtrl", "MO(1)", "LShift", "OSL(1)", "LT(2, Kc9)", "LM(1, LShift | LGui)"]
    ],
    [
        ["_", "TT(1)", "TG(2)", "_", "_", "_"],
        ["_", "_", "_", "_", "_", "_"]
    ]
]

[input]
input_pins = ["PIN_26", "PIN_27", "PIN_28", "PIN_29", "PIN_6", "PIN_0"]

# Optional: enable internal pull-ups since buttons go to GND
pullup = true

[[encoder]]
pin_a = "PIN_4"
pin_b = "PIN_3"

[[encoder]]
pin_a = "PIN_2"
pin_b = "PIN_1"
